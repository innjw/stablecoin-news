# 뉴스 수집 소스 카탈로그
# verified 필드는 verify_sources.py가 자동으로 갱신합니다.

# 1. 메타 검색 (가장 안정적, 1순위)
meta_search:
  google_news:
    enabled: true
    base_url: "https://news.google.com/rss/search"
    queries:
      - "스테이블코인 when:1d"
      - "원화 스테이블코인 when:1d"
      - "USDT OR USDC 한국 when:1d"
      - "테더 OR 서클 한국 when:1d"
      - "디지털화폐 한국은행 when:1d"
    params:
      hl: "ko"
      gl: "KR"
      ceid: "KR:ko"

  naver_news:
    enabled: true   # NAVER_CLIENT_ID/SECRET 환경변수 필요
    endpoint: "https://openapi.naver.com/v1/search/news.json"
    queries:
      - "스테이블코인"
      - "원화 스테이블코인"
      - "테더 한국"
      - "서클 코리아"
      - "USDC USDT"
    display: 50         # 한 번에 받을 건수 (max 100)
    sort: "date"        # date=최신순, sim=정확도순

# 2. 코인 전문지 직접 RSS (검증 후 사용)
direct_rss:
  - name: "코인데스크 코리아"
    url: "https://www.coindeskkorea.com/rss/allArticle.xml"
    verified: null
    weight: 1.5  # LLM 중요도 점수 가중치

  - name: "토큰포스트"
    url: "https://www.tokenpost.kr/rss"
    verified: null
    weight: 1.3

  - name: "블록미디어"
    url: "https://www.blockmedia.co.kr/feed"
    verified: null
    weight: 1.3

  - name: "디센트럴라이즈드"
    url: "https://decenter.kr/rss/allArticle.xml"
    verified: null
    weight: 1.2

  - name: "코인리더스"
    url: "https://www.coinreaders.com/rss/allArticle.xml"
    verified: null
    weight: 1.0

  - name: "디지털애셋"
    url: "https://www.digitalasset.works/feed"
    verified: null
    weight: 1.0

# 3. 정책·규제 1차 소스 (차별화 포인트)
regulators:
  - name: "금융위원회"
    url: "https://www.fsc.go.kr/po/RSSPress.do"
    verified: null
    keyword_filter: ["스테이블", "디지털자산", "가상자산", "CBDC", "디지털화폐", "전자금융"]
    weight: 2.0  # 규제 발표는 중요도 매우 높음

  - name: "기획재정부"
    url: "https://www.moef.go.kr/com/synap/synapView.do"  # 검증 필요
    verified: null
    keyword_filter: ["스테이블", "디지털화폐", "CBDC", "가상자산"]
    weight: 1.8

  - name: "한국은행"
    url: "https://www.bok.or.kr/portal/bbs/B0000338/list.do?menuNo=200761"  # RSS 직접 검증 필요
    verified: null
    keyword_filter: ["CBDC", "디지털화폐", "스테이블"]
    weight: 1.8

# 필터링 키워드 (이 키워드 중 하나는 반드시 포함되어야 함)
relevance_keywords:
  primary:    # 강한 관련성
    - "스테이블코인"
    - "스테이블 코인"
    - "stablecoin"
    - "USDT"
    - "USDC"
    - "테더"
    - "서클"
    - "Circle"
    - "원화 스테이블"
    - "KRW 스테이블"
    - "PYUSD"
    - "DAI"
  secondary:  # 약한 관련성 (primary와 함께 있을 때만 채택)
    - "CBDC"
    - "디지털화폐"
    - "디지털자산"
    - "전자금융"
    - "가상자산"
    - "암호화폐"

# 제외 키워드 (이게 들어있으면 제외)
exclude_keywords:
  - "광고"
  - "[광고]"
  - "PR"
  - "(광고)"
