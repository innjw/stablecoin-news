meta_search:
  google_news:
    enabled: true
    base_url: https://news.google.com/rss/search
    queries:
    - 스테이블코인 when:1d
    - 원화 스테이블코인 when:1d
    - USDT OR USDC 한국 when:1d
    - 테더 OR 서클 한국 when:1d
    - 디지털화폐 한국은행 when:1d
    params:
      hl: ko
      gl: KR
      ceid: KR:ko
  naver_news:
    enabled: true
    endpoint: https://openapi.naver.com/v1/search/news.json
    queries:
    - 스테이블코인
    - 원화 스테이블코인
    - 테더 한국
    - 서클 코리아
    - USDC USDT
    display: 50
    sort: date
