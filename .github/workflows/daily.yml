name: Daily Stablecoin News

on:
  schedule:
    # UTC 22:00 = KST 07:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # sent_urls.json 커밋용

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBERS_YAML: ${{ secrets.SUBSCRIBERS_YAML }}
        run: python main.py

      - name: Commit sent URLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_urls.json
          git diff --quiet --cached || git commit -m "Update sent URLs $(date +%F)"
          git push
