name: Verify RSS Sources

# 매주 일요일 03:00 KST에 RSS 소스가 살아있는지 재확인
on:
  schedule:
    - cron: '0 18 * * 6'  # UTC 토 18:00 = KST 일 03:00
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python verify_sources.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources.yaml
          git diff --quiet --cached || git commit -m "Verify RSS sources $(date +%F)"
          git push
